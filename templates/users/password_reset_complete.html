<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Senha Redefinida — LIDDIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;background:#070e1a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,212,255,.07) 1px, transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
.auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
.auth-card{
  background:#0d1b2e;border:1px solid rgba(0,212,255,.12);
  border-radius:16px;padding:40px;text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.success-icon{
  width:80px;height:80px;border-radius:50%;
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
}
.success-icon svg{width:36px;height:36px;stroke:#4ade80;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:24px;font-weight:900;color:#fff;margin-bottom:12px}
p{font-size:14px;color:#6b8caa;line-height:1.7;margin-bottom:8px}
.btn{
  display:block;width:100%;padding:12px;margin-top:28px;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#070e1a;border:none;border-radius:8px;
  font-size:14px;font-weight:800;cursor:pointer;
  transition:all .15s;font-family:inherit;text-decoration:none;
}
.btn:hover{filter:brightness(1.1);box-shadow:0 0 24px rgba(0,212,255,.25)}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Senha redefinida!</h1>
    <p>Sua senha foi alterada com sucesso.</p>
    <p>Agora você pode entrar na plataforma com a nova senha.</p>
    <a class="btn" href="{% url 'login' %}">Ir para o login</a>
  </div>
</div>
</body>
</html>
