<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-mail Enviado — LIDDIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;background:#070e1a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,212,255,.07) 1px, transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
.auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
.auth-card{
  background:#0d1b2e;border:1px solid rgba(0,212,255,.12);
  border-radius:16px;padding:40px;text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.success-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
}
.success-icon svg{width:32px;height:32px;stroke:#4ade80;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:14px}
p{font-size:14px;color:#6b8caa;line-height:1.7;margin-bottom:10px}
p strong{color:#e8f4ff}
.hint{
  margin-top:20px;padding:14px;
  background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);
  border-radius:8px;font-size:12px;color:#4a6a85;line-height:1.6;
}
.btn{
  display:block;width:100%;padding:12px;margin-top:24px;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#070e1a;border:none;border-radius:8px;
  font-size:14px;font-weight:800;cursor:pointer;
  transition:all .15s;font-family:inherit;text-decoration:none;
}
.btn:hover{filter:brightness(1.1);box-shadow:0 0 24px rgba(0,212,255,.25)}
.link-row{margin-top:18px;font-size:13px;color:#4a6a85}
.link-row a{color:#00d4ff;font-weight:600;text-decoration:none}
.link-row a:hover{color:#4ade80}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.23h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    </div>
    <h1>E-mail enviado!</h1>
    <p>
      Se o endereço informado estiver cadastrado,<br>
      você receberá um link para redefinir sua senha.
    </p>
    <p>Verifique também a pasta de <strong>spam/lixo eletrônico</strong>.</p>

    <div class="hint">
      O link expira em <strong>24 horas</strong>. Caso não receba,
      <a href="{% url 'password_reset' %}" style="color:#00d4ff;text-decoration:none">tente novamente</a>.
    </div>

    <a class="btn" href="{% url 'login' %}">Voltar para o login</a>
    <div class="link-row">
      <a href="{% url 'password_reset' %}">Reenviar e-mail</a>
    </div>
  </div>
</div>
</body>
</html>
