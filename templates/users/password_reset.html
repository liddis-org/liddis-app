<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recuperar Senha — LIDDIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;background:#070e1a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,212,255,.07) 1px, transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
body::after{
  content:'';position:fixed;width:600px;height:600px;
  background:radial-gradient(circle, rgba(0,212,255,.06) 0%, transparent 70%);
  top:-100px;right:-100px;pointer-events:none;
}
.auth-wrap{width:100%;max-width:420px;position:relative;z-index:1}
.auth-card{
  background:#0d1b2e;border:1px solid rgba(0,212,255,.12);
  border-radius:16px;padding:40px;
  box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.04);
}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo svg{width:52px;height:52px;margin:0 auto 14px;display:block}
.auth-logo h1{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px}
.auth-logo .sub{font-size:13px;color:#4a6a85;margin-top:12px;line-height:1.6}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:11px;font-weight:700;color:#6b8caa;margin-bottom:7px;text-transform:uppercase;letter-spacing:.7px}
.input{
  width:100%;padding:11px 14px;
  border:1.5px solid rgba(255,255,255,.07);border-radius:8px;
  font-size:14px;color:#e8f4ff;background:#112038;
  transition:border .15s,box-shadow .15s;outline:none;font-family:inherit;
}
.input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,.12)}
.input::placeholder{color:#4a6a85}
.btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#070e1a;border:none;border-radius:8px;
  font-size:14px;font-weight:800;cursor:pointer;
  transition:all .15s;margin-top:8px;font-family:inherit;
}
.btn:hover{filter:brightness(1.1);box-shadow:0 0 24px rgba(0,212,255,.25)}
.link-row{text-align:center;margin-top:22px;font-size:13px;color:#4a6a85}
.link-row a{color:#00d4ff;font-weight:600;text-decoration:none}
.link-row a:hover{color:#4ade80}
.errorlist{list-style:none;font-size:12px;color:#f87171;margin-top:4px}
.errorlist li{background:rgba(248,113,113,.08);padding:3px 10px;border-radius:5px;margin-top:3px}
.icon-wrap{
  width:64px;height:64px;border-radius:50%;
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.icon-wrap svg{width:28px;height:28px;stroke:#00d4ff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Recuperar Senha</h1>
      <div class="sub">
        Informe seu e-mail cadastrado e enviaremos<br>
        um link para criar uma nova senha.
      </div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">E-mail cadastrado</label>
        <input class="input" type="email" name="email" id="id_email"
               placeholder="seu@email.com" required autofocus autocomplete="email"/>
        {% if form.email.errors %}{{ form.email.errors }}{% endif %}
      </div>
      <button class="btn" type="submit">Enviar link de recuperação</button>
    </form>

    <div class="link-row">
      <a href="{% url 'login' %}">← Voltar para o login</a>
    </div>
  </div>
</div>
</body>
</html>
