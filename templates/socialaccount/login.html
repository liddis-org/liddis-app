<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entrar com Google — LIDDIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;background:#070e1a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(0,212,255,.07) 1px, transparent 1px);
  background-size:28px 28px;pointer-events:none;
}
body::after{
  content:'';position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(0,212,255,.06) 0%, transparent 70%);
  top:-100px;right:-100px;pointer-events:none;
}
.wrap{width:100%;max-width:400px;position:relative;z-index:1}
.card{
  background:#0d1b2e;
  border:1px solid rgba(0,212,255,.12);
  border-radius:16px;padding:40px;
  box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.04);
  text-align:center;
}
/* Logo */
.logo{margin-bottom:32px}
.logo svg{width:56px;height:56px;margin:0 auto 14px;display:block}
.logo h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:1.5px}
.logo .tag{font-size:11px;color:#4ade80;font-weight:600;letter-spacing:.3px;margin-top:4px}

/* Google icon */
.google-icon{
  width:52px;height:52px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.google-icon svg{width:28px;height:28px}

.title{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px}
.sub{font-size:13px;color:#6b8caa;line-height:1.6;margin-bottom:28px}

/* Form */
.btn-confirm{
  display:block;width:100%;padding:13px;
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  color:#070e1a;border:none;border-radius:9px;
  font-size:14px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:all .2s;
  box-shadow:0 4px 16px rgba(0,212,255,.2);
}
.btn-confirm:hover{filter:brightness(1.1);box-shadow:0 8px 28px rgba(0,212,255,.3);transform:translateY(-1px)}

.btn-cancel{
  display:block;margin-top:14px;
  font-size:13px;color:#4a6a85;text-decoration:none;
  transition:color .15s;
}
.btn-cancel:hover{color:#00d4ff}

.security{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:24px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.06);
  font-size:11px;color:#2a4a6a;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#4ade80"/>
          </linearGradient>
        </defs>
        <rect width="100" height="100" rx="20" fill="#0d1b2e"/>
        <path d="M50 8 L92 50 L50 92 L8 50 Z" fill="url(#lg)" opacity=".9"/>
        <rect x="45" y="28" width="10" height="44" rx="4" fill="#070e1a"/>
        <rect x="28" y="45" width="44" height="10" rx="4" fill="#070e1a"/>
      </svg>
      <h1>LIDDIS</h1>
      <div class="tag">Inteligência Clínica</div>
    </div>

    <div class="google-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </div>

    <div class="title">Conectar com Google</div>
    <div class="sub">
      Você será redirecionado para o Google para confirmar sua identidade.
      Nenhuma senha é armazenada pelo LIDDIS.
    </div>

    <form method="post" action="{% url 'google_login' %}">
      {% csrf_token %}
      <button class="btn-confirm" type="submit">
        Continuar com o Google →
      </button>
    </form>

    <a class="btn-cancel" href="{% url 'login' %}">← Voltar para o login</a>

    <div class="security">
      🔒 Conexão segura · OAuth 2.0 · Seus dados são protegidos
    </div>

  </div>
</div>
</body>
</html>
