# ════════════════════════════════════════════════════════════════════════════
#  Google Cloud Build — CI/CD para Cloud Run
#  Dispara automaticamente a cada push na branch main (configure no Console GCP)
#
#  Pré-requisitos:
#    1. Habilitar APIs: Cloud Build, Cloud Run, Artifact Registry, Secret Manager
#    2. Criar repositório no Artifact Registry:
#       gcloud artifacts repositories create liddis \
#         --repository-format=docker \
#         --location=southamerica-east1
#    3. Dar permissão de Cloud Run Admin ao SA do Cloud Build
#    4. Armazenar variáveis sensíveis no Secret Manager (veja passo a passo no DEPLOY_CHECKLIST.md)
# ════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: southamerica-east1
  _SERVICE: liddis-backend

steps:
  # ── 1. Build da imagem Docker ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:$BUILD_ID'
      - '--tag=southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:latest'
      - '--cache-from=southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ── 2. Push da imagem para Artifact Registry ───────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE'

  # ── 3. Deploy no Cloud Run ─────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image=southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:$BUILD_ID'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=60'
      - '--set-secrets=SECRET_KEY=liddis-secret-key:latest,DATABASE_URL=liddis-database-url:latest,GOOGLE_CLIENT_ID=liddis-google-client-id:latest,GOOGLE_SECRET=liddis-google-secret:latest,GMAIL_APP_PASSWORD=liddis-gmail-app-password:latest'
      - '--set-env-vars=DEBUG=False,ALLOWED_HOSTS=liddis-backend-tyi23kxkeq-rj.a.run.app,EMAIL_PROVIDER=gmail,GMAIL_USER=liddis.org@gmail.com,DEFAULT_FROM_EMAIL=liddis.org@gmail.com,SITE_NAME=LIDDIS,CSRF_TRUSTED_ORIGINS=https://liddis-backend-tyi23kxkeq-rj.a.run.app,SITE_DOMAIN=liddis-backend-tyi23kxkeq-rj.a.run.app,GCS_BUCKET_NAME=liddis-media'

images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:$BUILD_ID'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/liddis/$_SERVICE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
