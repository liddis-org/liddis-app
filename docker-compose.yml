version: '3.9'

# ── Desenvolvimento local com PostgreSQL ──────────────────────────────────────
# Uso:
#   docker compose up --build       → sobe tudo
#   docker compose exec web python manage.py migrate
#   docker compose exec web python manage.py createsuperuser

services:
  web:
    build: .
    ports:
      - "8000:8080"
    env_file: .env
    environment:
      # Sobrescreve o .env para usar o banco local do compose
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/liddis_db
      - DEBUG=True
      - USE_SQLITE=False
    volumes:
      # Hot-reload do código sem rebuild da imagem
      - .:/app
      - /app/staticfiles  # não sobrescreve staticfiles gerado no build
    command: python manage.py runserver 0.0.0.0:8080
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: liddis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
